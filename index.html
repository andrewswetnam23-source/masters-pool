<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 Masters Pool</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0d1f0f;
    color: #e8f5e9;
    min-height: 100vh;
  }

  header {
    background: #0a1a0b;
    border-bottom: 1px solid #1e4d22;
    padding: 1.25rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 0.75rem;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .flag-icon {
    width: 32px;
    height: 32px;
    background: #2e7d32;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }

  .logo h1 {
    font-size: 1.25rem;
    font-weight: 700;
    color: #f9d84a;
    letter-spacing: 0.5px;
  }

  .logo p {
    font-size: 0.75rem;
    color: #81c784;
    margin-top: 1px;
  }

  .status-bar {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.8rem;
    color: #81c784;
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #4caf50;
    animation: pulse 2s infinite;
  }

  .dot.offline { background: #757575; animation: none; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .refresh-btn {
    background: none;
    border: 1px solid #2e7d32;
    color: #81c784;
    padding: 0.35rem 0.75rem;
    border-radius: 6px;
    font-size: 0.78rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  .refresh-btn:hover { background: #1b5e20; color: #c8e6c9; }

  main { max-width: 900px; margin: 0 auto; padding: 1.5rem 1rem; }

  .round-info {
    background: #1b2e1d;
    border: 1px solid #2e4d31;
    border-radius: 10px;
    padding: 1rem 1.25rem;
    margin-bottom: 1.5rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 0.5rem;
  }

  .round-info .label { font-size: 0.78rem; color: #81c784; }
  .round-info .value { font-size: 1rem; font-weight: 600; color: #f9d84a; }

  .leaderboard {
    background: #1b2e1d;
    border: 1px solid #2e4d31;
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 2rem;
  }

  .leaderboard h2 {
    font-size: 0.85rem;
    font-weight: 600;
    color: #81c784;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 1rem 1.25rem 0.75rem;
    border-bottom: 1px solid #2e4d31;
  }

  table { width: 100%; border-collapse: collapse; }

  thead th {
    font-size: 0.72rem;
    font-weight: 600;
    color: #4caf50;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 0.6rem 1rem;
    text-align: left;
    background: #162518;
  }

  thead th:last-child { text-align: right; }

  tbody tr {
    border-top: 1px solid #1e3d21;
    transition: background 0.15s;
  }

  tbody tr:hover { background: #1e3820; }

  tbody tr.top-3 { background: #1a3320; }

  td {
    padding: 0.85rem 1rem;
    font-size: 0.9rem;
    vertical-align: middle;
  }

  .rank {
    font-weight: 700;
    font-size: 1rem;
    color: #aaa;
    width: 36px;
  }

  .rank-1 { color: #f9d84a; }
  .rank-2 { color: #c0c0c0; }
  .rank-3 { color: #cd7f32; }

  .player-name {
    font-weight: 600;
    color: #e8f5e9;
    font-size: 0.95rem;
  }

  .team-score {
    font-weight: 700;
    font-size: 1.1rem;
    text-align: right;
  }

  .score-under { color: #ef5350; }
  .score-over { color: #81c784; }
  .score-even { color: #aaa; }

  .picks-row td {
    padding: 0.3rem 1rem 0.75rem;
    vertical-align: top;
  }

  .picks-list {
    display: flex;
    flex-wrap: wrap;
    gap: 0.35rem;
    margin-top: 0.2rem;
  }

  .pick-chip {
    font-size: 0.72rem;
    padding: 0.2rem 0.5rem;
    border-radius: 4px;
    background: #162518;
    border: 1px solid #2e4d31;
    color: #a5d6a7;
    white-space: nowrap;
  }

  .pick-chip.made-cut { border-color: #388e3c; }
  .pick-chip.missed-cut { color: #757575; border-color: #333; text-decoration: line-through; }
  .pick-chip .score { margin-left: 4px; font-weight: 600; }
  .pick-chip .score.under { color: #ef5350; }
  .pick-chip .score.over { color: #81c784; }

  .tier-label {
    font-size: 0.65rem;
    color: #4caf50;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-right: 3px;
  }

  .section-title {
    font-size: 0.85rem;
    font-weight: 600;
    color: #81c784;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 0.75rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid #2e4d31;
  }

  .field-section {
    background: #1b2e1d;
    border: 1px solid #2e4d31;
    border-radius: 10px;
    padding: 1.25rem;
    margin-bottom: 1.5rem;
  }

  .tier-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 0.75rem;
  }

  .tier-card {
    background: #162518;
    border: 1px solid #2e4d31;
    border-radius: 8px;
    padding: 0.75rem 1rem;
  }

  .tier-card h3 {
    font-size: 0.72rem;
    font-weight: 700;
    color: #f9d84a;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 0.5rem;
  }

  .golfer-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.3rem 0;
    border-bottom: 1px solid #1e3820;
    font-size: 0.82rem;
  }

  .golfer-row:last-child { border-bottom: none; }
  .golfer-row .name { color: #c8e6c9; }
  .golfer-row .world-rank { font-size: 0.7rem; color: #4caf50; }
  .golfer-score { font-weight: 600; font-size: 0.85rem; }

  footer {
    text-align: center;
    padding: 1.5rem;
    font-size: 0.75rem;
    color: #4a7c4e;
  }

  .loading { text-align: center; padding: 2rem; color: #81c784; font-size: 0.9rem; }
  .error { text-align: center; padding: 2rem; color: #ef9a9a; font-size: 0.85rem; }

  .last-updated {
    font-size: 0.72rem;
    color: #4a7c4e;
    text-align: right;
    padding: 0.5rem 1rem 0.75rem;
  }

  @media (max-width: 600px) {
    .pick-chip { font-size: 0.68rem; }
    td { padding: 0.7rem 0.75rem; }
    .team-score { font-size: 1rem; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="flag-icon">⛳</div>
    <div>
      <h1>2026 Masters Pool</h1>
      <p>Augusta National · April 10–13</p>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:0.75rem;flex-wrap:wrap;">
    <div class="status-bar">
      <div class="dot" id="status-dot"></div>
      <span id="status-text">Loading...</span>
    </div>
    <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
  </div>
</header>

<main>
  <div class="round-info" id="round-info" style="display:none;">
    <div>
      <div class="label">Tournament</div>
      <div class="value" id="tournament-name">The Masters</div>
    </div>
    <div>
      <div class="label">Status</div>
      <div class="value" id="round-status">—</div>
    </div>
    <div>
      <div class="label">Players Remaining</div>
      <div class="value" id="players-remaining">—</div>
    </div>
  </div>

  <div class="leaderboard">
    <h2>Pool Standings</h2>
    <div id="standings-container"><div class="loading">Loading live scores...</div></div>
    <div class="last-updated" id="last-updated"></div>
  </div>

  <div class="field-section">
    <div class="section-title">Field by Tier</div>
    <div class="tier-grid" id="tier-grid"><div class="loading">Loading field...</div></div>
  </div>
</main>

<footer>Live scores via ESPN · Refreshes every 3 minutes during play</footer>

<script>
const PICKS = [
  // ── EDIT YOUR PARTICIPANTS HERE ──────────────────────────────────────────
  // Format: { name: "Player Name", picks: ["Golfer T1", "Golfer T2", "Golfer T3", "Golfer T4", "Golfer T5", "Golfer T6"] }
  // One golfer per tier. Tiers are assigned automatically by world ranking order in the field.
  // The golfer names must match the ESPN display names closely (first + last name).
  //
  // EXAMPLE ENTRIES — replace with your actual participants:
  { name: "Andrew", picks: ["Scottie Scheffler", "Rory McIlroy", "Tommy Fleetwood", "Russell Henley", "Fred Couples", "José María Olazábal"] },
  { name: "Tom", picks: ["Scottie Scheffler", "Bryson DeChambeau", "Hideki Matsuyama", "Sepp Straka", "Fred Couples", "Larry Mize"] },
  { name: "Stewart", picks: ["Xander Schauffele", "Collin Morikawa", "Tommy Fleetwood", "Denny McCarthy", "Mark O'Meara", "Ian Woosnam"] },
  // ── ADD MORE PARTICIPANTS BELOW ──────────────────────────────────────────
];

const TIERS = [
  { label: "Tier 1", desc: "World Rank 1–10", ranks: [1,10] },
  { label: "Tier 2", desc: "World Rank 11–25", ranks: [11,25] },
  { label: "Tier 3", desc: "World Rank 26–50", ranks: [26,50] },
  { label: "Tier 4", desc: "World Rank 51–100", ranks: [51,100] },
  { label: "Tier 5", desc: "Past Champions (non-top-100)", ranks: null },
  { label: "Tier 6", desc: "Remainder of field", ranks: null },
];

let golferData = {};
let fieldData = [];

async function loadData() {
  try {
    document.getElementById('status-text').textContent = 'Fetching scores...';
    document.getElementById('status-dot').className = 'dot';

    const resp = await fetch('https://site.api.espn.com/apis/site/v2/sports/golf/leaderboard?league=pga');
    if (!resp.ok) throw new Error('API error');
    const data = await resp.json();

    const events = data.events || [];
    const masters = events.find(e =>
      e.name && (e.name.toLowerCase().includes('masters') || e.shortName?.toLowerCase().includes('masters'))
    ) || events[0];

    if (!masters) throw new Error('Masters not found in feed');

    const comp = masters.competitions?.[0];
    if (!comp) throw new Error('No competition data');

    document.getElementById('round-info').style.display = 'flex';
    document.getElementById('tournament-name').textContent = masters.name || 'The Masters';
    document.getElementById('round-status').textContent = comp.status?.type?.description || '—';

    const competitors = comp.competitors || [];
    document.getElementById('players-remaining').textContent =
      competitors.filter(c => c.status !== 'cut').length + ' / ' + competitors.length;

    golferData = {};
    fieldData = [];

    competitors.forEach((c, idx) => {
      const displayName = c.athlete?.displayName || c.athlete?.fullName || '';
      const score = c.score?.displayValue || 'E';
      const scoreVal = parseScoreDisplay(score);
      const status = c.status?.toLowerCase() || '';
      const madeCut = !status.includes('cut');
      const worldRank = c.athlete?.rank ? parseInt(c.athlete.rank) : 999;

      golferData[displayName.toLowerCase()] = {
        name: displayName,
        score: scoreVal,
        scoreDisplay: score,
        madeCut,
        worldRank,
        position: c.sortOrder || idx,
      };

      fieldData.push({
        name: displayName,
        score: scoreVal,
        scoreDisplay: score,
        madeCut,
        worldRank,
      });
    });

    fieldData.sort((a, b) => a.worldRank - b.worldRank);
    assignTiers(fieldData);

    renderStandings();
    renderTierGrid();

    document.getElementById('status-text').textContent = 'Live';
    document.getElementById('status-dot').className = 'dot';
    document.getElementById('last-updated').textContent =
      'Last updated: ' + new Date().toLocaleTimeString();

  } catch (err) {
    console.error(err);
    document.getElementById('status-text').textContent = 'Offline';
    document.getElementById('status-dot').className = 'dot offline';
    document.getElementById('standings-container').innerHTML =
      '<div class="error">Could not load live scores. The tournament may not have started yet, or ESPN\'s feed is unavailable.<br><br>Scores will appear automatically once the Masters begins Thursday.</div>';
    document.getElementById('tier-grid').innerHTML =
      '<div class="error">Field data unavailable. Check back closer to Thursday.</div>';

    renderStandingsOffline();
  }
}

function parseScoreDisplay(str) {
  if (!str || str === 'E' || str === '--') return 0;
  const n = parseInt(str);
  return isNaN(n) ? 0 : n;
}

function assignTiers(players) {
  let tier5Used = new Set();
  let pastChamps = new Set([
    'fred couples','bernhard langer','sandy lyle','larry mize','ian woosnam',
    'josé maría olazábal','jose maria olazabal','mike weir','vijay singh',
    'angel cabrera','trevor immelman','zach johnson','charl schwartzel',
    'bubba watson','adam scott','jordan spieth','danny willett','sergio garcia',
    'patrick reed','tiger woods','phil mickelson','nick faldo','mark o\'meara',
    'mark o meara','fuzzy zoeller','gary player','ben crenshaw','jack nicklaus',
    'arnold palmer','tom watson','raymond floyd'
  ]);

  players.forEach(p => {
    const key = p.name.toLowerCase();
    if (p.worldRank <= 10) p.tier = 1;
    else if (p.worldRank <= 25) p.tier = 2;
    else if (p.worldRank <= 50) p.tier = 3;
    else if (p.worldRank <= 100) p.tier = 4;
    else if (pastChamps.has(key)) { p.tier = 5; tier5Used.add(key); }
    else p.tier = 6;
  });
}

function lookupGolfer(pickName) {
  const key = pickName.toLowerCase().trim();
  if (golferData[key]) return golferData[key];
  for (const [k, v] of Object.entries(golferData)) {
    if (k.includes(key) || key.includes(k)) return v;
    const lastName = k.split(' ').pop();
    if (lastName && pickName.toLowerCase().includes(lastName)) return v;
  }
  return null;
}

function renderStandings() {
  const teams = PICKS.map(p => {
    const golfers = p.picks.map((pick, i) => {
      const g = lookupGolfer(pick);
      return {
        pick,
        tier: i + 1,
        found: !!g,
        name: g ? g.name : pick,
        score: g ? g.score : 0,
        scoreDisplay: g ? g.scoreDisplay : '--',
        madeCut: g ? g.madeCut : true,
      };
    });
    const total = golfers.reduce((sum, g) => sum + (g.madeCut ? g.score : 0), 0);
    return { name: p.name, golfers, total };
  });

  teams.sort((a, b) => a.total - b.total);

  let html = '<table><thead><tr>';
  html += '<th style="width:36px;">Pos</th>';
  html += '<th>Participant</th>';
  html += '<th style="text-align:right;">Score</th>';
  html += '</tr></thead><tbody>';

  teams.forEach((team, idx) => {
    const rank = idx + 1;
    const rankClass = rank <= 3 ? `rank-${rank}` : '';
    const scoreClass = team.total < 0 ? 'score-under' : team.total > 0 ? 'score-over' : 'score-even';
    const scoreStr = team.total === 0 ? 'E' : (team.total > 0 ? '+' + team.total : team.total);
    const rowClass = rank <= 3 ? 'top-3' : '';

    html += `<tr class="${rowClass}">`;
    html += `<td class="rank ${rankClass}">${rank}</td>`;
    html += `<td class="player-name">${team.name}</td>`;
    html += `<td class="team-score ${scoreClass}">${scoreStr}</td>`;
    html += '</tr>';

    html += `<tr class="picks-row"><td></td><td colspan="2"><div class="picks-list">`;
    team.golfers.forEach(g => {
      const chipClass = !g.found ? '' : g.madeCut ? 'made-cut' : 'missed-cut';
      const scoreStr2 = g.scoreDisplay === '--' ? '' : g.scoreDisplay;
      const scoreClass2 = g.score < 0 ? 'under' : g.score > 0 ? 'over' : '';
      html += `<span class="pick-chip ${chipClass}">`;
      html += `<span class="tier-label">T${g.tier}</span>${g.name}`;
      if (scoreStr2) html += `<span class="score ${scoreClass2}">${scoreStr2}</span>`;
      html += `</span>`;
    });
    html += '</div></td></tr>';
  });

  html += '</tbody></table>';
  document.getElementById('standings-container').innerHTML = html;
}

function renderStandingsOffline() {
  const teams = PICKS.map(p => ({ name: p.name, golfers: p.picks.map((pick, i) => ({ pick, tier: i+1, name: pick })) }));
  let html = '<table><thead><tr><th style="width:36px;">Pos</th><th>Participant</th><th style="text-align:right;">Score</th></tr></thead><tbody>';
  teams.forEach((team, idx) => {
    html += `<tr><td class="rank">${idx+1}</td><td class="player-name">${team.name}</td><td class="team-score score-even">—</td></tr>`;
    html += `<tr class="picks-row"><td></td><td colspan="2"><div class="picks-list">`;
    team.golfers.forEach(g => {
      html += `<span class="pick-chip"><span class="tier-label">T${g.tier}</span>${g.name}</span>`;
    });
    html += '</div></td></tr>';
  });
  html += '</tbody></table>';
  document.getElementById('standings-container').innerHTML = html;
}

function renderTierGrid() {
  const tierBuckets = {1:[],2:[],3:[],4:[],5:[],6:[]};
  fieldData.forEach(p => { if (p.tier) tierBuckets[p.tier].push(p); });

  let html = '';
  TIERS.forEach((t, i) => {
    const num = i + 1;
    const players = tierBuckets[num] || [];
    html += `<div class="tier-card"><h3>${t.label} — ${t.desc}</h3>`;
    if (players.length === 0) {
      html += '<div class="golfer-row"><span class="name" style="color:#4a7c4e;">No players</span></div>';
    } else {
      players.forEach(p => {
        const sc = p.scoreDisplay === '--' ? '—' : p.scoreDisplay;
        const scClass = p.score < 0 ? 'score-under' : p.score > 0 ? 'score-over' : 'score-even';
        const cutStyle = p.madeCut ? '' : 'opacity:0.4;text-decoration:line-through;';
        html += `<div class="golfer-row" style="${cutStyle}">`;
        html += `<span class="name">${p.name}</span>`;
        html += `<span class="golfer-score ${scClass}">${sc}</span>`;
        html += '</div>';
      });
    }
    html += '</div>';
  });
  document.getElementById('tier-grid').innerHTML = html;
}

loadData();
setInterval(loadData, 3 * 60 * 1000);
</script>
</body>
</html>
